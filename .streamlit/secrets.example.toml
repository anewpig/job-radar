# 也可以改填 .env，app 啟動時會自動把 OIDC 設定同步到這份檔案。
[auth]
redirect_uri = "http://localhost:8501/oauth2callback"
cookie_secret = "replace-with-a-long-random-secret"

[auth.google]
client_id = "your-google-client-id"
client_secret = "your-google-client-secret"
server_metadata_url = "https://accounts.google.com/.well-known/openid-configuration"

# Streamlit 內建登入只支援 OIDC。
# 如果你要顯示 Facebook 按鈕，這裡必須填可用的 OIDC metadata endpoint。
# 實務上通常會透過 Auth0 / Keycloak / 其他 broker 暴露 Facebook 連線為 OIDC provider。
[auth.facebook]
client_id = "your-facebook-oidc-client-id"
client_secret = "your-facebook-oidc-client-secret"
server_metadata_url = "https://your-facebook-oidc-provider/.well-known/openid-configuration"
