name: CI

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m pip install .

      - name: Compile sources
        run: |
          python -m py_compile app.py
          python -m compileall -q src

      - name: Run focused unit tests
        run: |
          python -m unittest \
            tests.test_backend_status_service \
            tests.test_backend_status_cli \
            tests.test_rag_assistant \
            tests.test_resume_analysis \
            tests.test_chunking_eval \
            tests.test_vector_index \
            tests.test_pipeline \
            tests.test_runtime_maintenance_service \
            tests.test_job_cleaning

      - name: Run RAG regression gate
        run: |
          python scripts/benchmark_chunking_strategies.py \
            --case-set realistic \
            --top-k 5 \
            --gate-strategy current_structured \
            --gate-only \
            --baseline-file benchmarks/rag_retrieval_baseline.json \
            --min-hit-at-1 0.75 \
            --min-mrr 0.78 \
            --prompt-variant control

      - name: Build distribution
        run: python -m build
