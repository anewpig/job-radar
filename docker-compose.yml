services:
  job-radar:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      PORT: 8501
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_streamlit.sh"]

  job-radar-worker:
    build: .
    env_file:
      - .env
    environment:
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_crawl_worker.sh"]

  job-radar-scheduler:
    build: .
    env_file:
      - .env
    environment:
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_crawl_scheduler.sh"]
