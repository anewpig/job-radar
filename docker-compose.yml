services:
  job-radar:
    build: .
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      PORT: 8501
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
      JOB_RADAR_BACKEND_CONSOLE_ALLOWED_ROLES: operator,admin
      JOB_RADAR_DEPLOY_ENV: docker
      JOB_RADAR_RELEASE_CHANNEL: local
      JOB_SPY_LOG_FORMAT: json
      JOB_SPY_ASSISTANT_GENERAL_CHAT_MODEL: gpt-4.1-mini
      JOB_SPY_ASSISTANT_PROMPT_VARIANT: control
      JOB_SPY_ASSISTANT_ANN_SYNC_INTERVAL_SECONDS: "900"
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_streamlit.sh"]

  job-radar-worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
      JOB_RADAR_DEPLOY_ENV: docker
      JOB_RADAR_RELEASE_CHANNEL: local
      JOB_SPY_LOG_FORMAT: json
      JOB_SPY_ASSISTANT_PROMPT_VARIANT: control
      JOB_SPY_ASSISTANT_ANN_SYNC_INTERVAL_SECONDS: "900"
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_crawl_worker.sh"]

  job-radar-scheduler:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      JOB_SPY_DATA_DIR: /app/data
      JOB_SPY_CRAWL_EXECUTION_MODE: worker
      JOB_SPY_ENABLE_BACKEND_CONSOLE: "false"
      JOB_RADAR_DEPLOY_ENV: docker
      JOB_RADAR_RELEASE_CHANNEL: local
      JOB_SPY_LOG_FORMAT: json
      JOB_SPY_ASSISTANT_PROMPT_VARIANT: control
    volumes:
      - ./data:/app/data
    command: ["/app/scripts/start_crawl_scheduler.sh"]
